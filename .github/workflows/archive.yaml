name: Archive

on:
  schedule:
    # 每天凌晨0:13执行一次下载前一天的新闻详情
    - cron: '13 16 * * *'  # UTC 16:13 = 北京时间 0:13（次日）
  workflow_dispatch:
    inputs:
      date:
        description: '指定日期（格式：YYYY-MM-DD），留空则使用当天日期'
        required: false
        type: string

permissions:
  contents: write

jobs:
  Archive:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Get Latest Release Tag
        id: release-tag
        env:
          GH_TOKEN: ${{ secrets.BASE_REPO_TOKEN }}
        run: |
          TAG=$(gh api repos/${{ secrets.BASE_REPO_NAME }}/releases/latest --jq '.tag_name')
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Cache Binary
        id: cache-binary
        uses: actions/cache@v4
        with:
          path: opennews_dl
          key: opennews_dl-${{ steps.release-tag.outputs.tag }}

      - name: Get Date
        id: date
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            echo "date=${{ github.event.inputs.date }}" >> "$GITHUB_OUTPUT"
          else
            echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
          fi

      - name: Download Binary from Private Repo Release
        if: steps.cache-binary.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.BASE_REPO_TOKEN }}
        run: |
          gh release download ${{ steps.release-tag.outputs.tag }} \
            --repo ${{ secrets.BASE_REPO_NAME }} \
            --pattern "opennews_dl-*-linux-amd64"
          
          mv opennews_dl-*-linux-amd64 opennews_dl
          chmod +x opennews_dl

      - name: Download Config File
        env:
          GH_TOKEN: ${{ secrets.BASE_REPO_TOKEN }}
        run: |
          gh api "repos/${{ secrets.BASE_REPO_NAME }}/contents/go_proj/opennews_dl/configs/config.yaml?ref=${{ secrets.BASE_REPO_BRANCH }}" \
            --header "Accept: application/vnd.github.raw+json" \
            > config.yaml

      - name: Export CSV
        run: |
          rm -rf output/*
          ./opennews_dl init-db  -f config.yaml -date ${{ steps.date.outputs.date }}
          ./opennews_dl export -db  output/daily_news_db/${{ steps.date.outputs.date }}.db -o output/daily_news_v2/${{ steps.date.outputs.date }}.csv
          
      - name: Archive CSV
        run: |          
          mkdir -p output/daily_news_v2_gz
          gzip -c output/daily_news_v2/${{ steps.date.outputs.date }}.csv > output/daily_news_v2_gz/${{ steps.date.outputs.date }}.csv.gz
          ./opennews_dl upload -f config.yaml -file output/daily_news_v2_gz/${{ steps.date.outputs.date }}.csv.gz -key daily_news_v2/${{ steps.date.outputs.date }}.csv.gz

      - name: Clean Up Temporary Files
        run: |
          rm -rf config.yaml

      - name: Publish CSV to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: csv-${{ steps.date.outputs.date }}
          name: Daily News CSV ${{ steps.date.outputs.date }}
          body: |
            每日新闻 CSV 数据 - ${{ steps.date.outputs.date }}
          files: |
            output/daily_news_v2/${{ steps.date.outputs.date }}.csv
          fail_on_unmatched_files: false
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false


