name: 下载新闻详情

on:
  # schedule:
  #   # 每1小时执行一次
  #   - cron: '0 * * * *'
  workflow_dispatch: # 支持手动触发
    inputs:
      init_db:
        description: '是否从 R2 初始化数据库'
        required: false
        type: boolean
        default: false

jobs:
  detail:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 获取最新 Release Tag
        id: release-tag
        env:
          GH_TOKEN: ${{ secrets.BASE_REPO_TOKEN }}
        run: |
          TAG=$(gh api repos/${{ secrets.BASE_REPO_NAME }}/releases/latest --jq '.tag_name')
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: 缓存可执行文件
        id: cache-binary
        uses: actions/cache@v4
        with:
          path: opennews_dl
          key: opennews_dl-${{ steps.release-tag.outputs.tag }}

      - name: 获取当前日期
        id: date
        run: echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: 缓存数据库文件
        uses: actions/cache@v4
        with:
          path: output/db
          key: news-db-${{ steps.date.outputs.date }}-${{ github.run_id }}
          restore-keys: |
            news-db-${{ steps.date.outputs.date }}-

      - name: 从私有仓库 Release 下载二进制文件
        if: steps.cache-binary.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.BASE_REPO_TOKEN }}
        run: |
          gh release download ${{ steps.release-tag.outputs.tag }} \
            --repo ${{ secrets.BASE_REPO_NAME }} \
            --pattern "opennews_dl-*-linux-amd64"
          
          mv opennews_dl-*-linux-amd64 opennews_dl
          chmod +x opennews_dl

      - name: 下载配置文件
        env:
          GH_TOKEN: ${{ secrets.BASE_REPO_TOKEN }}
        run: |
          gh api "repos/${{ secrets.BASE_REPO_NAME }}/contents/go_proj/opennews_dl/config.detail.yaml?ref=${{ secrets.BASE_REPO_BRANCH }}" \
            --header "Accept: application/vnd.github.raw+json" \
            > config.detail.yaml

      - name: 执行新闻详情下载
        env:
          OPENNEWS_INIT_DB: ${{ github.event.inputs.init_db || 'false' }}
        run: |
          ./opennews_dl detail -f config.detail.yaml -date ${{ steps.date.outputs.date }}

      - name: 清理配置文件
        if: always()
        run: |
          rm -f config.detail.yaml
