name: Download News List

on:
  schedule:
    # 每5分钟执行一次
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Get Latest Release Tag
        id: release-tag
        env:
          GH_TOKEN: ${{ secrets.BASE_REPO_TOKEN }}
        run: |
          TAG=$(gh api repos/${{ secrets.BASE_REPO_NAME }}/releases/latest --jq '.tag_name')
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Cache Binary
        id: cache-binary
        uses: actions/cache@v4
        with:
          path: opennews_dl
          key: opennews_dl-${{ steps.release-tag.outputs.tag }}

      - name: Download Binary from Private Repo Release
        if: steps.cache-binary.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.BASE_REPO_TOKEN }}
        run: |
          gh release download ${{ steps.release-tag.outputs.tag }} \
            --repo ${{ secrets.BASE_REPO_NAME }} \
            --pattern "opennews_dl-*-linux-amd64"
          
          mv opennews_dl-*-linux-amd64 opennews_dl
          chmod +x opennews_dl

      - name: Download Config File
        env:
          GH_TOKEN: ${{ secrets.BASE_REPO_TOKEN }}
        run: |
          gh api "repos/${{ secrets.BASE_REPO_NAME }}/contents/go_proj/opennews_dl/configs/config.yaml?ref=${{ secrets.BASE_REPO_BRANCH }}" \
            --header "Accept: application/vnd.github.raw+json" \
            > config.yaml

      - name: Execute News List Download
        run: |
          rm -rf output/*
          ./opennews_dl init-db  -f config.yaml
          ./opennews_dl download -f config.yaml
          ./opennews_dl upload -f config.yaml -file output/daily_news_db -key daily_news_db
          rm -rf config.yaml

      - name: Print Database File Size
        if: always()
        run: |
          for f in output/db/*; do
            if [ -f "$f" ]; then
              SIZE_BYTES=$(stat -c%s "$f" 2>/dev/null || stat -f%z "$f" 2>/dev/null)
              SIZE_MB=$(awk "BEGIN {printf \"%.2f\", $SIZE_BYTES/1024/1024}")
              echo "$f: ${SIZE_BYTES} bytes (${SIZE_MB} MB)"
            fi
          done
